name: Thank You After Merge
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  send_thankyou:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Get PR contributor email
        uses: actions/github-script@v6
        id: get_email
        with:
          script: |
            const pr = context.payload.pull_request;
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            let email = '';
            for (const c of commits.data.reverse()) {
              if (c.commit && c.commit.author && c.commit.author.email) {
                email = c.commit.author.email;
                break;
              }
            }
            return email;
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Thank you for your contribution"
          body: "Thankyou for your contribution. PR has been successfully merged into Main Branch"
          to: ${{ steps.get_email.outputs.result }}
          from: "Atharva Borkar <${{ secrets.SMTP_USERNAME }}>"
